server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/smart_campus_dbnew?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:12345678}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:611370526810-vvh35ta1q5jji625bck9pjvuroqnc0r2.apps.googleusercontent.com}
            client-secret: ${GOOGLE_CLIENT_SECRET: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}
            redirect-uri: ${GOOGLE_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}
            scope:
              - email
              - profile
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}

app:
  frontend:
    url: ${APP_FRONTEND_URL:http://localhost:5173}
  mail:
    from: ${APP_MAIL_FROM:${MAIL_USERNAME:noreply@smartcampus.local}}
    require-delivery: ${APP_MAIL_REQUIRE_DELIVERY:false}
  jwt:
    secret: your_super_secret_key_123456789012345678901234567890
    expiration: 86400000
